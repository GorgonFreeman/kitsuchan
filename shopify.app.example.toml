# Copy to shopify.app.toml and replace `client_id` and the URLs.
# `application_url` should be your production URL (Cloud Run / custom domain). `npm run deploy` will rewrite it.
# `automatically_update_urls_on_dev = true` lets `shopify app dev` swap to a dev tunnel and revert on exit.
# https://shopify.dev/docs/apps/tools/cli/configuration

name = 'kitsuchan'
handle = 'kitsuchan'

client_id = 'REPLACE_WITH_CLIENT_ID_FROM_PARTNERS'

application_url = 'https://your-prod.example.com/'
embedded = true

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true

[access_scopes]
scopes = 'read_products,write_products'

[auth]
redirect_urls = [
  'https://your-prod.example.com/auth/callback',
]

[pos]
embedded = false

[webhooks]
api_version = '2026-04'

[[webhooks.subscriptions]]
topics = [ 'app/uninstalled' ]
uri = '/webhooks/app/uninstalled'

[[web]]
roles = [ 'frontend', 'backend' ]
[web.commands]
dev = 'npm run web:dev'
build = 'npm run build'
