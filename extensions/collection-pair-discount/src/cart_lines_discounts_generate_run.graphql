query CartInput(
  $collectionIds: [ID!]
) {
  cart {
    # ── Cart-level cost (for order threshold rules) ──────────────────────────
    cost {
      subtotalAmount {
        amount
        currencyCode
      }
      totalAmount {
        amount
        currencyCode
      }
    }

    # ── Line items ────────────────────────────────────────────────────────────
    lines {
      id
      quantity

      cost {
        subtotalAmount {
          amount
          currencyCode
        }
        totalAmount {
          amount
          currencyCode
        }
        amountPerQuantity {
          amount
          currencyCode
        }
        compareAtAmountPerQuantity {
          amount
          currencyCode
        }
      }

      # Existing allocations — for stacking / anti-double-discount logic
      discountAllocations {
        discountedAmount {
          amount
          currencyCode
        }
      }

      merchandise {
        __typename
        ... on ProductVariant {
          id

          product {
            inAnyCollection(ids: $collectionIds)
          }
        }
      }
    }
  }

  # ── Localization ──────────────────────────────────────────────────────────
  localization {
    market {
      id
      handle
    }
    country {
      isoCode
    }
    language {
      isoCode
    }
  }

  # ── Discount metadata ─────────────────────────────────────────────────────
  discount {
    discountClasses
  }

  # ── Code context ──────────────────────────────────────────────────────────
  enteredDiscountCodes {
    code
    rejectable
  }
  triggeringDiscountCode
}