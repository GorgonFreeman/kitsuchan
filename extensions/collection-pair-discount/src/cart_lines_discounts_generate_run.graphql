query CartInput($collectionIds: [ID!]) {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
        totalAmount {
          amount
        }
        amountPerQuantity {
          amount
        }
      }
      discountAllocations {
        discountedAmount {
          amount
        }
        discountApplication {
          targetType
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            inAnyCollection(ids: $collectionIds)
          }
        }
      }
    }
  }
  localization {
    market {
      id
      handle
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app", key: "function-configuration") {
      jsonValue
    }
  }
  enteredDiscountCodes {
    code
    rejectable
  }
  triggeringDiscountCode
}
