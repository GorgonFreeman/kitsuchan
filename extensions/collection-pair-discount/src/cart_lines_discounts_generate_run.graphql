query CartInput($collectionIds: [ID!]) {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            inAnyCollection(ids: $collectionIds)
          }
        }
      }
    }
  }

  localization {
    market {
      id
    }
  }
  presentmentCurrencyRate
  shop {
    metafield(namespace: "global", key: "conversion_rates") {
      jsonValue
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app", key: "function-configuration") {
      jsonValue
    }
  }
}
